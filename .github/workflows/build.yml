name: Build SS Tools Native

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --name=SS-Tools-Native --onefile --windowed --add-data "scanner;scanner" --hidden-import=flask --hidden-import=flask_cors --hidden-import=psutil --hidden-import=scanner --hidden-import=scanner.cheat_detector --hidden-import=scanner.minecraft_scanner --hidden-import=scanner.deleted_files --hidden-import=scanner.chrome_scanner_enhanced --hidden-import=scanner.kernel_checker --hidden-import=scanner.ghost_detector --hidden-import=scanner.advanced_detector --clean app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SS-Tools-Native-Windows
          path: dist/SS-Tools-Native.exe
          retention-days: 90

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors psutil pyinstaller

      - name: Build Binary
        run: |
          pyinstaller --name=SS-Tools-Native --onefile --console --add-data "scanner:scanner" --hidden-import=flask --hidden-import=flask_cors --hidden-import=psutil --hidden-import=scanner --hidden-import=scanner.cheat_detector --hidden-import=scanner.minecraft_scanner --hidden-import=scanner.deleted_files --hidden-import=scanner.chrome_scanner_enhanced --hidden-import=scanner.kernel_checker --hidden-import=scanner.ghost_detector --hidden-import=scanner.advanced_detector --clean app.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: SS-Tools-Native-Linux
          path: dist/SS-Tools-Native
          retention-days: 90

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SS-Tools-Native-Windows
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SS-Tools-Native-Linux
          path: artifacts/linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/SS-Tools-Native.exe
            artifacts/linux/SS-Tools-Native
          generate_release_notes: true
          draft: false
          prerelease: false
